<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pixel Friendship Quest v6</title>
<style>
body{margin:0;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;background:#020617;color:white;font-family:monospace}
canvas{border:3px solid #fff;image-rendering:pixelated;box-shadow:0 0 20px #fff}
#ui{text-align:center;margin-top:10px}
#message{opacity:0;transition:.5s;margin-top:8px}
button{margin-top:6px;padding:6px 12px;background:#2563eb;color:#fff;border:none;cursor:pointer}
</style>
</head>
<body>
<canvas id="game" width="480" height="360"></canvas>
<div id="ui">
<div id="status"></div>
<div id="message"></div>
<button onclick="restartGame()">Restart</button>
</div>
<script>
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');
const statusEl=document.getElementById('status');
const messageEl=document.getElementById('message');

const TILE=16,W=32,H=24;
let map,player,friend,found,startTime,particles=[],trail=[];

const messages=[
"💙 Abderrahmane! I missed you so much, my drifting legend!",
"🏎️ You found me! Let’s go drift through life together, Abderrahmane!",
"🎉 Happy early birthday Abderrahmane! I’ve been waiting for you!",
"✨ Abderrahmane, you make every adventure feel like a perfect drift!",
"🔥 Just like your drifting, you always find the perfect path to me!"
];

function beep(){const a=new (window.AudioContext||window.webkitAudioContext)();const o=a.createOscillator();o.connect(a.destination);o.start();o.stop(a.currentTime+0.1)}

function generate(){
 map=Array.from({length:H},()=>Array(W).fill(1));
 let visited=Array.from({length:H},()=>Array(W).fill(false));
 function carve(x,y){
  let dirs=[[1,0],[-1,0],[0,1],[0,-1]].sort(()=>Math.random()-0.5);
  visited[y][x]=true;map[y][x]=0;
  for(let[dX,dY] of dirs){
    let nx=x+dX*2, ny=y+dY*2;
    if(ny>0&&ny<H-1&&nx>0&&nx<W-1&&!visited[ny][nx]){
      map[y+dY][x+dX]=0;carve(nx,ny);
    }
  }
 }
 carve(2,2);
 player={x:2,y:2};
 let far=[];
 for(let y=0;y<H;y++)for(let x=0;x<W;x++)if(map[y][x]===0){
  let d=Math.hypot(x-player.x,y-player.y);
  if(d>10)far.push({x,y});
 }
 friend=far[Math.random()*far.length|0];
 found=false;startTime=Date.now();particles=[];trail=[];
}

let keys={};
document.onkeydown=e=>keys[e.key]=true;
document.onkeyup=e=>keys[e.key]=false;

canvas.addEventListener("touchmove",e=>{
 let t=e.touches[0];
 move((t.clientX-canvas.width/2)/100,(t.clientY-canvas.height/2)/100);
});

function move(dx,dy){
 let nx=player.x+dx,ny=player.y+dy;
 if(map[Math.floor(ny)]?.[Math.floor(nx)]===0){
  trail.push({x:player.x,y:player.y,life:1});
  player.x=nx;player.y=ny;
 }
}

let camX=0,camY=0;

function update(){
 if(keys['w']||keys['ArrowUp'])move(0,-0.15);
 if(keys['s']||keys['ArrowDown'])move(0,0.15);
 if(keys['a']||keys['ArrowLeft'])move(-0.15,0);
 if(keys['d']||keys['ArrowRight'])move(0.15,0);

 let dist=Math.hypot(player.x-friend.x,player.y-friend.y);

 if(!found && dist<0.5){
  found=true;
  messageEl.innerHTML=messages[Math.random()*messages.length|0]+"<br>🎂 Happy Birthday Abderrahmane!";
  messageEl.style.opacity=1;
  beep();
  for(let i=0;i<80;i++)particles.push({x:player.x,y:player.y,vx:(Math.random()-0.5)*1,vy:(Math.random()-0.5)*1,life:1});
 }

 particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.life-=0.02});
 particles=particles.filter(p=>p.life>0);

 trail.forEach(t=>t.life-=0.03);
 trail=trail.filter(t=>t.life>0);

 camX+=((player.x*TILE-canvas.width/2)-camX)*0.1;
 camY+=((player.y*TILE-canvas.height/2)-camY)*0.1;

 draw(dist);
 requestAnimationFrame(update);
}

function draw(dist){
 ctx.fillRect(0,0,canvas.width,canvas.height);

 for(let y=0;y<H;y++){
  for(let x=0;x<W;x++){
    let sx=x*TILE-camX,sy=y*TILE-camY;
    ctx.fillStyle=map[y][x]===1?"#312e81":"#0f172a";
    ctx.fillRect(sx,sy,TILE,TILE);
  }
 }

 // drift trail
 ctx.fillStyle="#38bdf8";
 trail.forEach(t=>{ctx.globalAlpha=t.life;ctx.fillRect(t.x*TILE-camX,t.y*TILE-camY,4,4);ctx.globalAlpha=1});

 // fog
 ctx.fillStyle="rgba(0,0,0,0.85)";
 ctx.beginPath();ctx.rect(0,0,canvas.width,canvas.height);
 ctx.arc(player.x*TILE-camX,player.y*TILE-camY,80,0,Math.PI*2,true);
 ctx.fill();

 // compass
 ctx.fillStyle="white";
 let a=Math.atan2(friend.y-player.y,friend.x-player.x);
 ctx.fillText("→",20+Math.cos(a)*10,20+Math.sin(a)*10);

 // minimap
 ctx.fillStyle="#000";
 ctx.fillRect(canvas.width-110,10,100,80);
 for(let y=0;y<H;y++)for(let x=0;x<W;x++)if(map[y][x]===0)ctx.fillRect(canvas.width-110+x*3,10+y*3,2,2);
 ctx.fillStyle="#3b82f6";ctx.fillRect(canvas.width-110+player.x*3,10+player.y*3,3,3);

 // player
 let size=8+Math.sin(Date.now()/100);
 ctx.fillStyle="#3b82f6";
 ctx.fillRect(player.x*TILE-camX-size/2,player.y*TILE-camY-size/2,size,size);
 // player name
 ctx.fillStyle="white";
 ctx.fillText("Abderrahmane",player.x*TILE-camX-25,player.y*TILE-camY-10);

 // friend with name
 if(!found){
  ctx.fillStyle="#22c55e";
  ctx.fillRect(friend.x*TILE-camX-4,friend.y*TILE-camY-4,8,8);
  ctx.fillStyle="white";
  ctx.fillText("Sofiane",friend.x*TILE-camX-15,friend.y*TILE-camY-10);
 }
 }

 // particles (confetti)
 ctx.fillStyle="#facc15";
 particles.forEach(p=>ctx.fillRect(p.x*TILE-camX,p.y*TILE-camY,3,3));

 statusEl.textContent=found?"🎉 You found Abderrahmane!":"Explore carefully...";
}

function restartGame(){messageEl.style.opacity=0;generate()}

messageEl.innerHTML="Press any key to start";
messageEl.style.opacity=1;
document.addEventListener("keydown",()=>messageEl.style.opacity=0);

generate();update();
</script>
</body>
</html>
