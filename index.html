<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pixel Friendship Quest v8</title>
<style>
body{margin:0;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;background:#020617;color:white;font-family:monospace}
canvas{border:3px solid #fff;image-rendering:pixelated;box-shadow:0 0 20px #fff}
#dialogueBox{
 position:absolute;bottom:20px;width:420px;
 background:rgba(0,0,0,0.9);
 border:2px solid #fff;padding:10px;
 display:none
}
#speaker{font-weight:bold;margin-bottom:5px}
#portrait{width:40px;height:40px;display:inline-block;margin-right:8px}
</style>
</head>
<body>
<canvas id="game" width="480" height="360"></canvas>
<div id="dialogueBox">
<div style="display:flex;align-items:center">
<div id="portrait"></div>
<div id="speaker"></div>
</div>
<div id="dialogueText"></div>
<div style="font-size:12px;opacity:.7">(click to continue)</div>
</div>
<script>
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');
const dialogueBox=document.getElementById('dialogueBox');
const dialogueTextEl=document.getElementById('dialogueText');
const speakerEl=document.getElementById('speaker');
const portraitEl=document.getElementById('portrait');

const TILE=16,W=32,H=24;
let map,player,friend,found,trail=[];

// multiple dialogue variations (more playful)
const dialogues=[
[
 {speaker:"Sofiane",text:"There you are, took you long enough 😄"},
 {speaker:"Abderrahmane",text:"Had to take the scenic route... drifting style."},
 {speaker:"Sofiane",text:"😂 Of course you did."},
 {speaker:"Sofiane",text:"By the way... happy early birthday 🎉"}
],
[
 {speaker:"Sofiane",text:"I knew you'd find me eventually."},
 {speaker:"Abderrahmane",text:"Maze had no chance."},
 {speaker:"Sofiane",text:"Confidence level: 100%"},
 {speaker:"Sofiane",text:"Birthday coming up... ready? 😎"}
],
[
 {speaker:"Sofiane",text:"Bro you actually made it."},
 {speaker:"Abderrahmane",text:"Was there ever any doubt?"},
 {speaker:"Sofiane",text:"A little bit 😂"},
 {speaker:"Sofiane",text:"Anyway, early happy birthday 🏎️"}
]
];

let currentDialogue=[], currentLine=0, charIndex=0, typing=true;
let typingSpeed=2;

function startDialogue(){
 currentDialogue = dialogues[Math.random()*dialogues.length|0];
 dialogueBox.style.display='block';
 currentLine=0;charIndex=0;typing=true;
 zooming=true;
}

canvas.addEventListener('click',()=>{
 if(!found) return;
 if(typing){
   dialogueTextEl.innerHTML=currentDialogue[currentLine].text;
   typing=false;
 } else {
   currentLine++;
   if(currentLine>=currentDialogue.length){
     dialogueBox.style.display='none';
     zooming=false;
   } else {
     charIndex=0;typing=true;
   }
 }
});

function generate(){
 map=Array.from({length:H},()=>Array(W).fill(1));
 let visited=Array.from({length:H},()=>Array(W).fill(false));
 function carve(x,y){
  let dirs=[[1,0],[-1,0],[0,1],[0,-1]].sort(()=>Math.random()-0.5);
  visited[y][x]=true;map[y][x]=0;
  for(let[dX,dY] of dirs){
    let nx=x+dX*2, ny=y+dY*2;
    if(ny>0&&ny<H-1&&nx>0&&nx<W-1&&!visited[ny][nx]){
      map[y+dY][x+dX]=0;carve(nx,ny);
    }
  }
 }
 carve(2,2);
 player={x:2,y:2};
 let far=[];
 for(let y=0;y<H;y++)for(let x=0;x<W;x++)if(map[y][x]===0){
  let d=Math.hypot(x-player.x,y-player.y);
  if(d>10)far.push({x,y});
 }
 friend=far[Math.random()*far.length|0];
 found=false;trail=[];
}

let keys={};
document.onkeydown=e=>keys[e.key]=true;
document.onkeyup=e=>keys[e.key]=false;

function move(dx,dy){
 let nx=player.x+dx,ny=player.y+dy;
 if(map[Math.floor(ny)]?.[Math.floor(nx)]===0){
  trail.push({x:player.x,y:player.y,life:1});
  player.x=nx;player.y=ny;
 }
}

let camX=0,camY=0,zoom=1,zooming=false;

function update(){
 if(!found){
  if(keys['w']||keys['ArrowUp'])move(0,-0.15);
  if(keys['s']||keys['ArrowDown'])move(0,0.15);
  if(keys['a']||keys['ArrowLeft'])move(-0.15,0);
  if(keys['d']||keys['ArrowRight'])move(0.15,0);
 }

 let dist=Math.hypot(player.x-friend.x,player.y-friend.y);

 if(!found && dist<0.5){
  found=true;
  startDialogue();
 }

 // typing effect with variable speed
 if(found && typing){
   let line=currentDialogue[currentLine];
   speakerEl.textContent=line.speaker;
   portraitEl.style.background = line.speaker==="Abderrahmane"?"#3b82f6":"#22c55e";
   if(charIndex < line.text.length){
     if(Math.random()<0.7){
       dialogueTextEl.innerHTML=line.text.slice(0,charIndex);
       charIndex++;
     }
   } else typing=false;
 }

 trail.forEach(t=>t.life-=0.03);
 trail=trail.filter(t=>t.life>0);

 // camera + zoom
 camX+=((player.x*TILE-canvas.width/2)-camX)*0.1;
 camY+=((player.y*TILE-canvas.height/2)-camY)*0.1;
 if(zooming) zoom+= (1.2-zoom)*0.05; else zoom+= (1-zoom)*0.05;

 draw();
 requestAnimationFrame(update);
}

function draw(){
 ctx.setTransform(zoom,0,0,zoom,0,0);
 ctx.fillRect(0,0,canvas.width,canvas.height);

 for(let y=0;y<H;y++){
  for(let x=0;x<W;x++){
    let sx=x*TILE-camX,sy=y*TILE-camY;
    ctx.fillStyle=map[y][x]===1?"#312e81":"#0f172a";
    ctx.fillRect(sx,sy,TILE,TILE);
  }
 }

 ctx.fillStyle="#38bdf8";
 trail.forEach(t=>{ctx.globalAlpha=t.life;ctx.fillRect(t.x*TILE-camX,t.y*TILE-camY,4,4);ctx.globalAlpha=1});

 ctx.fillStyle="rgba(0,0,0,0.85)";
 ctx.beginPath();ctx.rect(0,0,canvas.width,canvas.height);
 ctx.arc(player.x*TILE-camX,player.y*TILE-camY,80,0,Math.PI*2,true);
 ctx.fill();

 ctx.fillStyle="#3b82f6";
 ctx.fillRect(player.x*TILE-camX-4,player.y*TILE-camY-4,8,8);
 ctx.fillStyle="white";
 ctx.fillText("Abderrahmane",player.x*TILE-camX-25,player.y*TILE-camY-10);

 if(!found){
  ctx.fillStyle="#22c55e";
  ctx.fillRect(friend.x*TILE-camX-4,friend.y*TILE-camY-4,8,8);
  ctx.fillStyle="white";
  ctx.fillText("Sofiane",friend.x*TILE-camX-15,friend.y*TILE-camY-10);
 }
}

function restartGame(){dialogueBox.style.display='none';zooming=false;generate()}

generate();update();
</script>
</body>
</html>
