<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مسعى الصداقة — عيد ميلاد</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;font-family:monospace;background:#020617;color:#fff}
body{display:flex;flex-direction:column;align-items:center;justify-content:center}

#gw{
  position:relative;
  width:min(90vw, 133vh);
  aspect-ratio:4/3;
  border:3px solid #fff;
  box-shadow:0 0 30px rgba(255,255,255,.18);
}

#game{
  display:block;
  width:100%;
  height:100%;
  image-rendering:pixelated;
}

/* ── RESPONSIVE FONT SYSTEM ── */
/* Uses clamp(min, preferred, max) so text scales between mobile & desktop */

/* MISSION SCREEN */
#ms{position:absolute;inset:0;background:rgba(2,6,23,.97);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:clamp(6px,1.5vw,14px);padding:clamp(12px,3vw,28px)}
#ms h2{font-size:clamp(15px,3.5vw,22px);color:#facc15;letter-spacing:0.2em;text-shadow:0 0 12px #facc15}
.mbody{font-size:clamp(11px,2.2vw,15px);color:#cbd5e1;line-height:1.7;text-align:center;max-width:90%;font-family:'Segoe UI',Tahoma,Arial,sans-serif}
.ctrl{font-size:clamp(10px,1.8vw,13px);color:#475569;font-family:monospace}
.btn{background:#facc15;color:#020617;border:none;font-family:'Segoe UI',Tahoma,Arial,sans-serif;font-size:clamp(12px,2.5vw,16px);font-weight:bold;padding:clamp(7px,1.5vw,11px) clamp(16px,4vw,28px);cursor:pointer;letter-spacing:0.05em;margin-top:clamp(2px,0.5vw,6px);transition:background .15s}
.btn:hover{background:#fde047}
.gbtn{background:transparent;color:#475569;border:1px solid #334155;font-family:'Segoe UI',Tahoma,Arial,sans-serif;font-size:clamp(10px,2vw,13px);padding:clamp(5px,1vw,8px) clamp(12px,3vw,20px);cursor:pointer;transition:all .15s}
.gbtn:hover{color:#94a3b8;border-color:#475569}

/* DIALOGUE */
#dlg{position:absolute;bottom:clamp(4px,1.5vw,10px);left:clamp(4px,1.5vw,10px);right:clamp(4px,1.5vw,10px);background:rgba(0,0,0,.94);border:2px solid #fff;padding:clamp(8px,2vw,14px);display:none;direction:rtl;border-radius:6px}
#dlgh{display:flex;align-items:center;gap:clamp(8px,2vw,14px);margin-bottom:clamp(4px,1vw,8px);flex-direction:row-reverse}
#dlgp{width:clamp(28px,6vw,40px);height:clamp(28px,6vw,40px);border:1px solid rgba(255,255,255,.25);flex-shrink:0}
#dlgs{font-weight:bold;font-size:clamp(12px,2.5vw,16px);font-family:'Segoe UI',Tahoma,Arial,sans-serif}
#dlgt{font-size:clamp(11px,2.2vw,15px);line-height:1.55;color:#e2e8f0;min-height:1em;font-family:'Segoe UI',Tahoma,Arial,sans-serif}
#dlghi{font-size:clamp(9px,1.6vw,12px);color:#475569;margin-top:clamp(3px,0.8vw,6px);text-align:left;font-family:monospace;direction:ltr}

/* CAKE POPUP */
#ckp{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(2,6,23,.96);border:2px solid #facc15;padding:clamp(10px,2.5vw,18px) clamp(14px,3.5vw,24px);text-align:center;pointer-events:none;display:none;z-index:5;min-width:40%;max-width:82%;direction:rtl}
.cpt{color:#facc15;font-size:clamp(13px,3vw,18px);margin-bottom:clamp(4px,1vw,8px);font-family:'Segoe UI',Tahoma,Arial,sans-serif}
.cpm{font-size:clamp(11px,2.2vw,14px);color:#cbd5e1;line-height:1.6;white-space:pre-line;font-family:'Segoe UI',Tahoma,Arial,sans-serif}

/* CUTSCENE */
#cs{position:absolute;inset:0;background:#000;display:none;align-items:center;justify-content:center;flex-direction:column;text-align:center}
#csc{position:absolute;inset:0;pointer-events:none}
#cscon{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;gap:clamp(5px,1.2vw,10px);padding:clamp(8px,2vw,16px)}
.csh{font-size:clamp(18px,5vw,30px);color:#facc15;letter-spacing:0.1em;animation:glow 1s infinite alternate;font-family:'Segoe UI',Tahoma,Arial,sans-serif}
.csn{font-size:clamp(14px,3.5vw,22px);color:#3b82f6;letter-spacing:0.1em;text-shadow:0 0 14px #3b82f6;font-family:'Segoe UI',Tahoma,Arial,sans-serif}
.csf{font-size:clamp(10px,2vw,13px);color:#475569;margin-top:2px;font-family:'Segoe UI',Tahoma,Arial,sans-serif}
.csmsg{font-size:clamp(11px,2.2vw,14px);color:#94a3b8;line-height:1.65;max-width:90%;margin:clamp(3px,0.8vw,6px) 0;font-family:'Segoe UI',Tahoma,Arial,sans-serif;direction:rtl}
@keyframes glow{from{text-shadow:0 0 8px #facc15}to{text-shadow:0 0 20px #facc15,0 0 40px #f97316}}

/* ── TOUCH D-PAD ── */
#dpad{
  position:absolute;
  bottom:clamp(6px,2vw,14px);
  left:clamp(6px,2vw,14px);
  display:none; /* shown only on touch */
  grid-template-columns:repeat(3,1fr);
  grid-template-rows:repeat(3,1fr);
  width:clamp(90px,22vw,130px);
  height:clamp(90px,22vw,130px);
  gap:3px;
  z-index:10;
  user-select:none;
  -webkit-user-select:none;
}
.dp{
  background:rgba(255,255,255,.12);
  border:1px solid rgba(255,255,255,.22);
  border-radius:4px;
  display:flex;align-items:center;justify-content:center;
  font-size:clamp(14px,4vw,22px);
  cursor:pointer;
  transition:background .08s;
  -webkit-tap-highlight-color:transparent;
  touch-action:none;
}
.dp:active,.dp.pressed{background:rgba(255,255,255,.32)}
.dp.blank{background:transparent;border:none;pointer-events:none}
</style>
</head>
<body>
<div id="gw">
  <canvas id="game" width="480" height="360"></canvas>

  <div id="ms">
    <h2>📋 بيانُ المسعى</h2>
    <div class="mbody" id="msbody"></div>
    <div class="ctrl" id="ctrlhint">🕹 WASD أو أسهم الاتجاه للتحرك</div>
    <button class="btn" id="sbtn">▶ انطلق</button>
    <button class="gbtn" id="rbtn" style="display:none">↺ عُد من جديد</button>
  </div>

  <div id="dlg">
    <div id="dlgh"><div id="dlgp"></div><div id="dlgs"></div></div>
    <div id="dlgt"></div>
    <div id="dlghi">(انقر للمتابعة)</div>
  </div>

  <div id="ckp"><div class="cpt">🎂 اكتشفتَ الكعكة!</div><div class="cpm" id="ckm"></div></div>

  <div id="cs">
    <canvas id="csc" width="480" height="360"></canvas>
    <div id="cscon">
      <div class="csh">🎉 عيدُ ميلادٍ مبارك 🎉</div>
      <div class="csn">عبد الرحمان</div>
      <div class="csf">— إهداءٌ بكلِّ محبةٍ من سفيان —</div>
      <canvas id="cspa" width="110" height="72" style="margin:8px 0;image-rendering:pixelated"></canvas>
      <div class="csmsg">
        وجدتَ سفيان، وقطعتَ المتاهة، وخرجتَ منها ظافراً كعادتك 🚗💨<br><br>
        بارك الله في عُمرك وزادك من فضله ورزقه،<br>يا خيرَ صاحبٍ وأوفى رفيق 💙
      </div>
      <button class="btn" id="pabtn" style="margin-top:8px">↺ عُد من جديد</button>
    </div>
  </div>

  <!-- Touch D-pad: up=row1col2, left=row2col1, blank=row2col2, right=row2col3, down=row3col2 -->
  <div id="dpad">
    <div class="dp blank"></div>
    <div class="dp" id="dp-up">▲</div>
    <div class="dp blank"></div>
    <div class="dp" id="dp-right">▶</div>
    <div class="dp blank"></div>
    <div class="dp" id="dp-left">◀</div>
    <div class="dp blank"></div>
    <div class="dp" id="dp-down">▼</div>
    <div class="dp blank"></div>
  </div>
</div>

<script>
// ── AUDIO ──────────────────────────────────────────────────────────────────────
let AC = null;
function initAC() { if (!AC) AC = new (window.AudioContext || window.webkitAudioContext)(); }

function tone(freq, dur, type='square', vol=0.07, delay=0) {
  if (!AC) return;
  const t = AC.currentTime + delay;
  const o = AC.createOscillator(), g = AC.createGain();
  o.type = type; o.frequency.value = freq;
  g.gain.setValueAtTime(vol, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  o.connect(g); g.connect(AC.destination);
  o.start(t); o.stop(t + dur + 0.05);
}

const sfx = {
  step:    () => tone(55 + Math.random()*25, 0.04, 'square', 0.02),
  found:   () => [523,659,784,1047].forEach((f,i) => tone(f,0.18,'square',0.1,i*0.12)),
  cake:    () => [523,587,659,784,880,1047].forEach((f,i) => tone(f,0.14,'triangle',0.1,i*0.075)),
  fanfare: () => [[523,.12],[659,.12],[784,.12],[1047,.28],[880,.12],[1047,.55]]
               .reduce((acc,[f,d])=>{ tone(f,d,'square',0.13,acc); return acc+d; },0),
};

function mstart(){}
function mstop(){}

// ── CONSTANTS ──────────────────────────────────────────────────────────────────
const CV=document.getElementById('game'), ctx=CV.getContext('2d');
const CW=480, CH=360, TILE=16, W=31, H=23;
const MAZE_CFG={minDist:13};

const CAKE_MSG='تركها سفيانُ هديةً في خبايا الدرب 🎂\n«احفظ لي نصيباً منها يا رفيقَ العمر»';

const DLGS=[
  [
    {s:'سفيان',t:'ها قد جئت… بعد طول انتظار، وبعد صبرٍ واختبار.'},
    {s:'عبد الرحمن',t:'من صدق في السير، بلغ… ومن ثبت، وصل.'},
    {s:'سفيان',t:'وهكذا أنت، لا تميل ولا تتغيّر.'},
    {s:'سفيان',t:'كل عام وأنت بخير يا أخي… جعل الله أيامك نورًا، وقلبك سرورًا، ورزقك موفورًا.'}
  ],
  [
    {s:'سفيان',t:'كنت أعلم أنك ستصل، ولو طال الطريق، واشتدّ الضيق.'},
    {s:'عبد الرحمن',t:'من عرف وجهته، سَهُل عليه المسير، وخفّ عليه التعب.'},
    {s:'سفيان',t:'صدق القول، وثبت الأصل.'},
    {s:'سفيان',t:'عيدك مبارك يا عبد الرحمن… أسأل الله أن يحفظك، ويرفع قدرك، ويكتب لك الخير حيث كان.'}
  ],
  [
    {s:'سفيان',t:'لبثتُ هنا زمنًا… حتى خِلتُ أن لا مخرج، ولا سبيل.'},
    {s:'عبد الرحمن',t:'للصبر نهاية، وللأمر تمام، ولكل ضيقٍ انفراج.'},
    {s:'سفيان',t:'نِعم ما قلت، ونِعم ما فعلت.'},
    {s:'سفيان',t:'بارك الله في عمرك يا أخي… وجعل لك من كل همٍّ فرجًا، ومن كل ضيقٍ مخرجًا، ومن كل أمرٍ رشدًا.'}
  ],
];

const SC={'سفيان':'#22c55e','عبد الرحمن':'#3b82f6'};

// ── STATE ──────────────────────────────────────────────────────────────────────
let STATE='MISSION';
let map, player, friend, cake;
let found=false, cakeFound=false;
let trail=[];
let camX=0, camY=0, zoom=1;
let keys={}, touch={up:false,down:false,left:false,right:false}, stepC=0;
let curDlg=[], dlgL=0, dlgC=0, dlgTyp=false;

// ── TOUCH DETECTION & D-PAD ────────────────────────────────────────────────────
const isTouchDevice = () => window.matchMedia('(hover: none) and (pointer: coarse)').matches || ('ontouchstart' in window);

function setupDpad(){
  const dpad = document.getElementById('dpad');
  if(isTouchDevice()){
    dpad.style.display='grid';
    document.getElementById('ctrlhint').textContent='🕹 استخدم الأزرار أدناه للتحرك';
  }

  function bindBtn(id, key){
    const el = document.getElementById(id);
    const press = e => { e.preventDefault(); touch[key]=true; el.classList.add('pressed'); };
    const release = e => { e.preventDefault(); touch[key]=false; el.classList.remove('pressed'); };
    el.addEventListener('touchstart', press, {passive:false});
    el.addEventListener('touchend',   release, {passive:false});
    el.addEventListener('touchcancel',release, {passive:false});
    // mouse fallback for desktop testing
    el.addEventListener('mousedown', press);
    el.addEventListener('mouseup',   release);
    el.addEventListener('mouseleave',release);
  }
  bindBtn('dp-up',    'up');
  bindBtn('dp-down',  'down');
  bindBtn('dp-left',  'left');
  bindBtn('dp-right', 'right');
}

// ── MAZE GENERATION ────────────────────────────────────────────────────────────
function genMaze(){
  map=Array.from({length:H},()=>Array(W).fill(1));
  const vis=Array.from({length:H},()=>Array(W).fill(false));
  function carve(x,y){
    vis[y][x]=true; map[y][x]=0;
    [[2,0],[-2,0],[0,2],[0,-2]].sort(()=>Math.random()-.5).forEach(([dx,dy])=>{
      const nx=x+dx,ny=y+dy;
      if(nx>0&&nx<W-1&&ny>0&&ny<H-1&&!vis[ny][nx]){map[y+dy/2][x+dx/2]=0;carve(nx,ny);}
    });
  }
  carve(1,1);

  const open=[];
  for(let y=0;y<H;y++)for(let x=0;x<W;x++)if(map[y][x]===0)open.push({x,y});

  player={x:1,y:1};
  camX=player.x*TILE-CW/2; camY=player.y*TILE-CH/2;

  const L=MAZE_CFG;
  const far=open.filter(p=>Math.hypot(p.x-1,p.y-1)>=L.minDist);
  friend=far[Math.random()*far.length|0]||open[open.length-1];
  found=false;

  const used=new Set([`${friend.x},${friend.y}`,'1,1']);
  const cc=open.filter(p=>!used.has(`${p.x},${p.y}`)&&Math.hypot(p.x-1,p.y-1)>4);
  cake=cc.length?cc[Math.random()*cc.length|0]:null;
  cakeFound=false; trail=[];
}

// ── SPRITES ────────────────────────────────────────────────────────────────────
function drawChar(x,y,color,frame){
  ctx.fillStyle=color;
  ctx.fillRect(x-3,y-14,6,5);
  ctx.fillRect(x-2,y-9,4,5);
  ctx.fillRect(x-5,y-8,3,3);
  ctx.fillRect(x+2,y-8,3,3);
  if(frame===0){ctx.fillRect(x-2,y-4,2,4);ctx.fillRect(x,y-4,2,4);}
  else{ctx.fillRect(x-2,y-4,2,3);ctx.fillRect(x-2,y-1,1,1);ctx.fillRect(x,y-4,2,3);ctx.fillRect(x+1,y-1,1,1);}
  ctx.fillStyle='rgba(0,0,0,.7)';
  ctx.fillRect(x-2,y-13,1,1);ctx.fillRect(x+1,y-13,1,1);
}

function drawCake(x,y){
  const fl=0.7+Math.sin(Date.now()/350)*0.3;
  ctx.fillStyle=`rgba(250,204,21,${fl})`;ctx.fillRect(x-1,y-17,2,3);
  ctx.fillStyle='#f97316';ctx.fillRect(x-1,y-14,2,4);
  ctx.fillStyle='#f9a8d4';ctx.fillRect(x-7,y-10,14,10);
  ctx.fillStyle='#fff';ctx.fillRect(x-7,y-11,14,2);
  ctx.fillStyle='#22c55e';ctx.fillRect(x-5,y-7,3,2);ctx.fillRect(x+2,y-7,3,2);
}

function drawPixelPortrait(){
  const c=document.getElementById('cspa'),p=c.getContext('2d');
  p.clearRect(0,0,110,72);
  p.fillStyle='#3b82f6';
  p.fillRect(12,10,14,11);p.fillRect(13,21,12,13);
  p.fillRect(7,22,6,9);p.fillRect(25,22,6,9);
  p.fillRect(13,34,5,10);p.fillRect(20,34,5,10);
  p.fillStyle='#fff';p.fillRect(16,12,2,2);p.fillRect(21,12,2,2);
  p.fillStyle='#facc15';p.beginPath();p.moveTo(19,10);p.lineTo(15,1);p.lineTo(23,1);p.closePath();p.fill();
  p.fillStyle='#f97316';p.fillRect(18,3,2,2);
  p.fillStyle='#22c55e';
  p.fillRect(84,10,14,11);p.fillRect(85,21,12,13);
  p.fillRect(79,22,6,9);p.fillRect(97,22,6,9);
  p.fillRect(85,34,5,10);p.fillRect(92,34,5,10);
  p.fillStyle='#fff';p.fillRect(88,12,2,2);p.fillRect(93,12,2,2);
  p.fillStyle='#f97316';p.beginPath();p.moveTo(91,10);p.lineTo(87,1);p.lineTo(95,1);p.closePath();p.fill();
  p.fillStyle='#facc15';p.fillRect(90,3,2,2);
  p.font='24px serif';p.fillText('🎉',40,46);
}

// ── UI REFS ────────────────────────────────────────────────────────────────────
const msEl=document.getElementById('ms');
const msBodyEl=document.getElementById('msbody');
const rbtn=document.getElementById('rbtn');
const dlgEl=document.getElementById('dlg');
const dlgP=document.getElementById('dlgp');
const dlgS=document.getElementById('dlgs');
const dlgT=document.getElementById('dlgt');
const ckpEl=document.getElementById('ckp');
const ckmEl=document.getElementById('ckm');
const csEl=document.getElementById('cs');
const cscCV=document.getElementById('csc');
const cscCtx=cscCV.getContext('2d');

// ── MISSION SCREEN ─────────────────────────────────────────────────────────────
function showMission(){
  STATE='MISSION'; mstop();
  msBodyEl.innerHTML=`<span style="color:#22c55e;font-weight:bold">سفيان</span> تاهَ في دروب المتاهة المظلمة.<br>
  انطلق كـ<span style="color:#3b82f6;font-weight:bold">عبد الرحمان</span> وابحث عن رفيقك قبل أن يطول الانتظار!<br><br>
  🎂 ابحث عن <span style="color:#facc15;font-weight:bold">كعكة عيد الميلاد</span> المخفيَّة لرسالةٍ خاصة!`;
  rbtn.style.display='none';
  msEl.style.display='flex';
}

document.getElementById('sbtn').addEventListener('click',()=>{
  initAC(); genMaze();
  msEl.style.display='none';
  STATE='PLAYING';
  mstart();
});

rbtn.addEventListener('click',()=>showMission());
document.getElementById('pabtn').addEventListener('click',()=>{
  csEl.style.display='none'; csRunning=false; showMission();
});

// ── DIALOGUE ───────────────────────────────────────────────────────────────────
function startDlg(){
  curDlg=DLGS[Math.random()*DLGS.length|0];
  dlgL=0; dlgC=0; dlgTyp=true;
  dlgEl.style.display='block';
  STATE='DIALOGUE';
}

function advDlg(){
  if(STATE!=='DIALOGUE')return;
  if(dlgTyp){dlgT.innerHTML=curDlg[dlgL].t; dlgTyp=false;}
  else{
    if(++dlgL>=curDlg.length){
      dlgEl.style.display='none'; showCS();
    } else{dlgC=0;dlgTyp=true;}
  }
}
CV.addEventListener('click',advDlg);
dlgEl.addEventListener('click',advDlg);
CV.addEventListener('touchend', e=>{ e.preventDefault(); advDlg(); }, {passive:false});

// ── CUTSCENE ───────────────────────────────────────────────────────────────────
let confetti=[], csRunning=false;

function showCS(){
  STATE='CUTSCENE'; mstop(); sfx.fanfare(); drawPixelPortrait();
  confetti=Array.from({length:170},()=>({
    x:Math.random()*CW, y:Math.random()*-130,
    vx:(Math.random()-.5)*2, vy:1.5+Math.random()*2.5,
    color:['#facc15','#3b82f6','#22c55e','#f97316','#ec4899','#a78bfa','#38bdf8'][Math.random()*7|0],
    w:5+Math.random()*5, h:2+Math.random()*3,
    rot:Math.random()*Math.PI*2, rv:(Math.random()-.5)*0.13,
  }));
  csEl.style.display='flex'; csRunning=true; animCS();
}

function animCS(){
  if(!csRunning)return;
  cscCtx.clearRect(0,0,CW,CH);
  confetti.forEach(c=>{
    c.x+=c.vx; c.y+=c.vy; c.rot+=c.rv;
    if(c.y>CH+10){c.y=-10;c.x=Math.random()*CW;}
    cscCtx.save(); cscCtx.translate(c.x,c.y); cscCtx.rotate(c.rot);
    cscCtx.fillStyle=c.color; cscCtx.fillRect(-c.w/2,-c.h/2,c.w,c.h);
    cscCtx.restore();
  });
  requestAnimationFrame(animCS);
}

// ── MINIMAP ────────────────────────────────────────────────────────────────────
function drawMinimap(){
  ctx.setTransform(1,0,0,1,0,0);
  const MW=72,MH=54,MX=CW-MW-6,MY=6;
  const TW=MW/W,TH=MH/H;

  ctx.fillStyle='rgba(0,0,0,.78)'; ctx.fillRect(MX-2,MY-2,MW+4,MH+4);
  ctx.strokeStyle='rgba(255,255,255,.2)'; ctx.lineWidth=1; ctx.strokeRect(MX-2,MY-2,MW+4,MH+4);

  for(let y=0;y<H;y++)for(let x=0;x<W;x++){
    ctx.fillStyle=map[y][x]===1?'#1e1b4b':'#1e293b';
    ctx.fillRect(MX+x*TW,MY+y*TH,TW+.5,TH+.5);
  }

  trail.forEach(t=>{
    ctx.fillStyle=`rgba(56,189,248,${t.life*.4})`;
    ctx.fillRect(MX+t.x*TW,MY+t.y*TH,TW,TH);
  });

  if(cake&&!cakeFound){ctx.fillStyle='rgba(250,204,21,.55)';ctx.fillRect(MX+cake.x*TW-1,MY+cake.y*TH-1,3,3);}
  if(!found){ctx.fillStyle='rgba(34,197,94,.15)';ctx.fillRect(MX+friend.x*TW-1,MY+friend.y*TH-1,3,3);}
  ctx.fillStyle='#3b82f6'; ctx.fillRect(MX+player.x*TW-1.5,MY+player.y*TH-1.5,3,3);

  ctx.font='7px monospace'; ctx.fillStyle='rgba(255,255,255,.35)'; ctx.textAlign='left';
  ctx.fillText('MAP',MX,MY-3);
}

// ── DRAW ───────────────────────────────────────────────────────────────────────
function draw(){
  ctx.setTransform(zoom,0,0,zoom,0,0);
  ctx.fillStyle='#020617'; ctx.fillRect(0,0,CW,CH);

  for(let y=0;y<H;y++)for(let x=0;x<W;x++){
    const sx=x*TILE-camX, sy=y*TILE-camY;
    if(map[y][x]===1){
      ctx.fillStyle='#312e81'; ctx.fillRect(sx,sy,TILE,TILE);
      ctx.fillStyle='rgba(0,0,0,.28)';
      ctx.fillRect(sx,sy+TILE-2,TILE,2); ctx.fillRect(sx+TILE-2,sy,2,TILE-2);
    } else {
      ctx.fillStyle='#0f172a'; ctx.fillRect(sx,sy,TILE,TILE);
      ctx.strokeStyle='rgba(255,255,255,.04)'; ctx.lineWidth=.5; ctx.strokeRect(sx,sy,TILE,TILE);
    }
  }

  trail.forEach(t=>{
    ctx.fillStyle='#38bdf8'; ctx.globalAlpha=t.life*.5;
    ctx.fillRect(t.x*TILE-camX+6,t.y*TILE-camY+6,4,4);
  });
  ctx.globalAlpha=1;

  const now=performance.now();

  if(cake&&!cakeFound){
    const cx=cake.x*TILE-camX+TILE/2, cy=cake.y*TILE-camY+TILE/2;
    drawCake(cx,cy);
    const a=.7+Math.sin(now/400)*.3;
    ctx.fillStyle=`rgba(250,204,21,${a})`; ctx.font='8px monospace'; ctx.textAlign='center';
    ctx.fillText('CAKE',cx,cy-20); ctx.textAlign='left';
  }

  if(!found){
    const fx=friend.x*TILE-camX+TILE/2, fy=friend.y*TILE-camY+TILE/2;
    drawChar(fx,fy,'#22c55e',Math.floor(now/300)%2);
    ctx.fillStyle='#22c55e'; ctx.font='9px monospace'; ctx.textAlign='center';
    ctx.fillText('Sofiane',fx,fy-20); ctx.textAlign='left';
  }

  const px=player.x*TILE-camX+TILE/2, py=player.y*TILE-camY+TILE/2;
  drawChar(px,py,'#3b82f6',Math.floor(now/250)%2);
  ctx.fillStyle='#3b82f6'; ctx.font='9px monospace'; ctx.textAlign='center';
  ctx.fillText('Abderrahmane',px,py-20); ctx.textAlign='left';

  ctx.fillStyle='rgba(0,0,0,.88)';
  ctx.beginPath(); ctx.rect(0,0,CW,CH);
  ctx.arc(px,py,74,0,Math.PI*2,true); ctx.fill();

  drawMinimap();
}

// ── MOVEMENT ───────────────────────────────────────────────────────────────────
function move(dx,dy){
  const nx=player.x+dx, ny=player.y+dy;
  if(map[Math.floor(ny)]?.[Math.floor(nx)]===0){
    trail.push({x:player.x,y:player.y,life:1});
    player.x=nx; player.y=ny;
    if(++stepC%9===0) sfx.step();
  }
}

// ── MAIN LOOP ──────────────────────────────────────────────────────────────────
let lastT=0;

function loop(t){
  const dt=Math.min((t-lastT)/1000,0.05); lastT=t;

  if(STATE==='PLAYING'){
    if(keys['w']||keys['ArrowUp']   ||touch.up)    move(0,-.12);
    if(keys['s']||keys['ArrowDown'] ||touch.down)  move(0,.12);
    if(keys['a']||keys['ArrowLeft'] ||touch.left)  move(-.12,0);
    if(keys['d']||keys['ArrowRight']||touch.right) move(.12,0);

    if(cake&&!cakeFound&&Math.hypot(player.x-cake.x,player.y-cake.y)<0.9){
      cakeFound=true;
      ckmEl.textContent=CAKE_MSG;
      ckpEl.style.display='block'; sfx.cake();
      setTimeout(()=>{ckpEl.style.display='none';},3200);
    }

    camX+=((player.x*TILE-CW/2)-camX)*0.12;
    camY+=((player.y*TILE-CH/2)-camY)*0.12;
    trail.forEach(t2=>t2.life-=0.02);
    trail=trail.filter(t2=>t2.life>0);
    zoom+=(1-zoom)*0.05;

    if(!found&&Math.hypot(player.x-friend.x,player.y-friend.y)<0.8){
      found=true;
      mstop(); sfx.found();
      STATE='WAITING';
      setTimeout(startDlg,420);
    }

  } else if(STATE==='DIALOGUE'){
    const line=curDlg[dlgL];
    if(line){
      const col=SC[line.s]||'#fff';
      dlgS.innerHTML=`<span style="color:${col}">${line.s}</span>`;
      dlgP.style.background=col;
      if(dlgTyp&&dlgC<line.t.length){if(Math.random()<0.6)dlgT.innerHTML=line.t.slice(0,dlgC++);}
      else if(dlgTyp) dlgTyp=false;
    }
  }

  if(STATE!=='CUTSCENE'&&STATE!=='MISSION'&&map) draw();
  requestAnimationFrame(loop);
}

document.addEventListener('keydown',e=>{keys[e.key]=true;if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key))e.preventDefault();});
document.addEventListener('keyup',e=>keys[e.key]=false);

// ── CANVAS RESIZE ─────────────────────────────────────────────────────────────
function resizeCanvas(){
  const gw=document.getElementById('gw');
  const cv=document.getElementById('game');
  cv.width=480; cv.height=360; // keep internal resolution fixed
}
window.addEventListener('resize', resizeCanvas);

// ── INIT ───────────────────────────────────────────────────────────────────────
setupDpad();
showMission();
requestAnimationFrame(t=>{lastT=t;requestAnimationFrame(loop);});
</script>
